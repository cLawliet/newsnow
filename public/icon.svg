  <!-- Title bar -->
  <rect x="42" y="48" width="50" height="7" rx="3.5" fill="#E53935"/>
  <!-- Content lines -->
  <rect x="42" y="64" width="69" height="5" rx="2.5" fill="#B0BEC5"/>
  <rect x="42" y="76" width="69" height="5" rx="2.5" fill="#B0BEC5"/>
  <rect x="42" y="88" width="52" height="5" rx="2.5" fill="#B0BEC5"/>
  <rect x="42" y="100" width="60" height="5" rx="2.5" fill="#B0BEC5"/>

  <!-- Corner fold triangle -->
  <path d="M117 28 L121 32 L121 28 Z" fill="#EF5350" opacity="0.4"/>
